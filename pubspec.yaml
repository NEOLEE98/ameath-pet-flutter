name: aemeath_pet
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  desktop_multi_window: ^0.3.0
  window_manager_plus: ^1.0.5
  screen_retriever: ^0.2.0
  flutter_overlay_window: ^0.5.0
  tray_manager: ^0.5.2
  launch_at_startup: ^0.5.1
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  flutter_localizations:
    sdk: flutter
  intl: any

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/aemeath.png
